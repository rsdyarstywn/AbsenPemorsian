<!DOCTYPE html>
<html>
<head>
    <title>Absensi Divisi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background-color: #f4f4f9;}
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #333; }
        select, button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box;}
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 20px;}
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Absensi Kehadiran</h3>
        <select id="nama">
            <option value="">-- Pilih Nama --</option>
            <option value="Bulqis">Bulqis</option>
            <option value="Kiranti Maulidya Muntasir">Kiranti Maulidya Muntasir</option>
            <option value="Muh. Syafiq">Muh. Syafiq</option>
            <option value="Nuraeni">Nuraeni</option>
            <option value="Nur Aisyah">Nur Aisyah</option>
            <option value="Nur Ziqrah">Nur Ziqrah</option>
            <option value="Rusdi Aristiawan">Rusdi Aristiawan</option>
            <option value="Siti Jumasiah">Siti Jumasiah</option>
            <option value="Siska">Siska</option>
        </select>
        <select id="status">
            <option value="Hadir">Hadir</option>
            <option value="Izin">Izin</option>
            <option value="Sakit">Sakit</option>
        </select>
        <button id="btnSubmit" onclick="kirimAbsen()">Kirim Kehadiran</button>
    </div>

    <script>
        async function kirimAbsen() {
            // GANTI TEKS DI BAWAH INI DENGAN URL DARI GOOGLE APPS SCRIPT ANDA
            const scriptURL = 'https://script.google.com/macros/s/AKfycbyFZihiiQBFX6ZhWHthEXTfecfpVUYc4MVHHLS-afVJZ9TmQQyO3bP_CupIn8ePsbY/exec'; 
            
            const nama = document.getElementById('nama').value;
            const status = document.getElementById('status').value;
            const btnSubmit = document.getElementById('btnSubmit');

            if(!nama) return alert('Silakan pilih nama terlebih dahulu!');

            // Ubah tombol saat proses pengiriman
            btnSubmit.innerHTML = "Mengirim...";
            btnSubmit.disabled = true;

            const data = {
                nama: nama,
                status: status
            };

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                alert('Terima kasih, absen berhasil dicatat!');
                document.getElementById('nama').value = ''; // Reset pilihan nama
            } catch (error) {
                alert('Terjadi kesalahan, silakan coba lagi.');
            } finally {
                // Kembalikan tombol seperti semula
                btnSubmit.innerHTML = "Kirim Kehadiran";
                btnSubmit.disabled = false;
            }
        }
    </script>
</body>
</html>

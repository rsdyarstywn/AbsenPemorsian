<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Kehadiran Divisi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h2 {
            margin: 0;
            color: #1a1a1a;
            font-size: 22px;
        }
        .header p {
            margin: 5px 0 0;
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            background-color: #fcfcfc;
        }
        select:focus {
            border-color: #007bff;
        }
        
        /* Gaya untuk tombol status (Radio Chips) */
        .status-options {
            display: flex;
            gap: 10px;
        }
        .status-options input[type="radio"] {
            display: none; /* Sembunyikan radio button asli */
        }
        .status-btn {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            transition: all 0.2s;
            background-color: #fff;
        }
        /* Warna saat dipilih */
        #status-hadir:checked + .status-btn { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        #status-izin:checked + .status-btn { background: #fff8e1; border-color: #ffc107; color: #f57f17; }
        #status-sakit:checked + .status-btn { background: #ffebee; border-color: #f44336; color: #c62828; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background-color: #0056b3;
        }
        .submit-btn:disabled {
            background-color: #a0c4ff;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h2>Absensi Harian</h2>
            <p>Silakan isi kehadiran Anda hari ini</p>
        </div>

        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <select id="nama">
                <option value="" disabled selected>-- Ketuk untuk memilih nama --</option>
                <option value="Anggota 1">Anggota 1</option>
                <option value="Anggota 2">Anggota 2</option>
                <option value="Anggota 3">Anggota 3</option>
                <option value="Anggota 4">Anggota 4</option>
                <option value="Anggota 5">Anggota 5</option>
                <option value="Anggota 6">Anggota 6</option>
                <option value="Anggota 7">Anggota 7</option>
                <option value="Anggota 8">Anggota 8</option>
                <option value="Pemimpin Divisi">Pemimpin Divisi</option>
            </select>
        </div>

        <div class="form-group">
            <label>Status Kehadiran</label>
            <div class="status-options">
                <input type="radio" id="status-hadir" name="status" value="Hadir">
                <label for="status-hadir" class="status-btn">Hadir</label>

                <input type="radio" id="status-izin" name="status" value="Izin">
                <label for="status-izin" class="status-btn">Izin</label>

                <input type="radio" id="status-sakit" name="status" value="Sakit">
                <label for="status-sakit" class="status-btn">Sakit</label>
            </div>
        </div>

        <button class="submit-btn" id="btn-kirim" onclick="kirimAbsen()">Kirim Absen Sekarang</button>
    </div>
